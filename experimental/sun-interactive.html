<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Sun | COSMOS</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Open Sans", sans-serif; background: #000; color: #e0e0e0; overflow: hidden; }
    #renderCanvas { width: 100%; height: 100vh; display: block; outline: none; touch-action: none; }

    /* --- Info panel (top-left) --- */
    #info {
      position: absolute; top: 16px; left: 16px;
      background: rgba(10,6,0,0.92); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 16px 20px; max-width: 320px;
      font-size: 14px; line-height: 1.6; z-index: 10; pointer-events: none;
    }
    #info h2 { font-size: 18px; font-weight: 300; margin-bottom: 6px; color: #fff; }
    #info .desc { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 4px; }
    #info .hint { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 8px; }
    .readout { margin-top: 10px; font-size: 12px; font-family: "Courier New", monospace; color: rgba(255,255,255,0.8); }
    .readout div { margin-bottom: 2px; }
    .readout span { color: #fff; font-weight: 600; }

    /* --- Embedded mode --- */
    body.embedded #info h2,
    body.embedded #info .desc,
    body.embedded #info .hint { display: none; }
    body.embedded #info { max-width: 220px; padding: 8px 12px; top: 8px; left: 8px; }
    body.embedded #info .readout { margin-top: 0; font-size: 11px; }
    body.embedded #credit { display: none; }

    /* --- Controls bar (bottom) --- */
    #controls {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 12px; flex-wrap: nowrap;
      background: rgba(10,6,0,0.92); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 8px 16px; z-index: 10; max-width: 95vw;
    }
    #controls label { font-size: 11px; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
    #controls input[type="range"] { width: 60px; accent-color: #DC2D27; cursor: pointer; }
    #controls input[type="checkbox"] { accent-color: #DC2D27; }
    .val { min-width: 20px; text-align: right; display: inline-block; font-size: 11px; }
    .sep { width: 1px; height: 18px; background: rgba(255,255,255,0.12); flex-shrink: 0; }

    /* --- Loading / credit --- */
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-size: 16px; font-weight: 300; color: rgba(255,255,255,0.4);
      z-index: 20; pointer-events: none;
    }
    #credit {
      position: absolute; bottom: 52px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: rgba(255,255,255,0.25); z-index: 10; pointer-events: none;
    }
    #credit a { color: rgba(255,255,255,0.35); }

    @media (max-width: 600px) {
      #controls { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>

  <div id="loading">Loading&hellip;</div>

  <div id="info">
    <h2>The Sun</h2>
    <p class="desc">Artistic rendering of our nearest star, showing surface granulation, hot spots, flares and coronal glow.</p>
    <div class="readout">
      <div>Spectral type: <span>G2V</span></div>
      <div>Surface temp: <span>5,800</span> K</div>
      <div>Activity: <span id="r-act">Moderate</span></div>
      <div>Luminosity: <span>3.86 &times; 10<sup>26</sup></span> W</div>
    </div>
    <p class="hint">Drag to orbit &middot; Scroll to zoom</p>
  </div>

  <div id="controls">
    <label>Speed <input type="range" id="sl-speed" min="0" max="3" step="0.1" value="1"> <span class="val" id="v-speed">1.0</span></label>
    <div class="sep"></div>
    <label>Activity <input type="range" id="sl-activity" min="0.1" max="1" step="0.05" value="0.5"> <span class="val" id="v-act">0.50</span></label>
    <div class="sep"></div>
    <label><input type="checkbox" id="cb-autorot" checked> Auto-rotate</label>
  </div>

  <div id="credit">Particle system by <a href="https://playground.babylonjs.com/#MX2Z99#185" target="_blank">Babylon.js</a></div>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script>
  /* ================================================================
     Interactive Sun – Babylon.js ParticleHelper "sun" preset
     COSMOS Encyclopedia · Swinburne Astronomy Online
     Replicates playground.babylonjs.com/#MX2Z99#185
     ================================================================ */

  if (window.self !== window.top) document.body.classList.add('embedded');

  const canvas = document.getElementById('renderCanvas');
  const engine = new BABYLON.Engine(canvas, true);

  (async () => {
    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color3(0.0, 0.0, 0.0);

    /* ---- Camera (matches playground) ---- */
    const camera = new BABYLON.ArcRotateCamera('cam',
      -Math.PI / 2, Math.PI / 2.2, 5,
      new BABYLON.Vector3(0, 0, 0), scene);
    camera.lowerRadiusLimit = 2.25;
    camera.upperRadiusLimit = 25;
    camera.wheelDeltaPercentage = 0.01;
    camera.attachControl(canvas, true);
    camera.panningSensibility = 0;

    /* ---- Load particle sun from Babylon asset server ---- */
    const set = await BABYLON.ParticleHelper.CreateAsync("sun", scene);
    set.start();

    document.getElementById('loading').style.display = 'none';

    /* ---- Limb darkening ----
       A semi-transparent dark sphere rendered AFTER the particles.
       Fresnel makes it transparent at centre, dark at the edges. */
    const limbSphere = BABYLON.MeshBuilder.CreateSphere('limb',
      { diameter: 2.03, segments: 64 }, scene);
    const limbMat = new BABYLON.StandardMaterial('limbMat', scene);
    limbMat.diffuseColor  = BABYLON.Color3.Black();
    limbMat.emissiveColor = BABYLON.Color3.Black();
    limbMat.disableLighting = true;
    limbMat.backFaceCulling = true;
    limbMat.opacityFresnelParameters = new BABYLON.FresnelParameters({
      power: 4,
      leftColor:  new BABYLON.Color3(0.45, 0.45, 0.45),   /* edge: ~45% opaque */
      rightColor: BABYLON.Color3.Black()                    /* centre: transparent */
    });
    limbSphere.renderingGroupId = 2;  /* draw after particles */

    /* Collect systems & emitter meshes */
    const systems = set.systems;
    const meshEmitters = [];
    for (const system of systems) {
      if (system.emitter && !(system.emitter instanceof BABYLON.Vector3)) {
        if (!meshEmitters.includes(system.emitter)) {
          meshEmitters.push(system.emitter);
        }
      }
    }

    /* Slow down the default particle animation — the raw preset
       is too "undulating".  Scale all updateSpeeds to 60% of preset. */
    const SPEED_DAMP = 0.6;
    systems.forEach(s => s.updateSpeed *= SPEED_DAMP);

    /* Boost flares — the preset only emits ~1/s and caps at 20 particles.
       Shorter lifetime = faster cycling = more visual variety.
       Widen scale range: small wisps to big dramatic arcs. */
    systems.forEach(s => {
      if (s.name.toLowerCase().includes('flare')) {
        s.emitRate *= 4;
        s.minLifeTime = 4;   s.maxLifeTime = 8;   /* faster cycling (was 10/10) */
        s.minScaleX = 0.3;   s.maxScaleX = 3.0;
        s.minScaleY = 0.3;   s.maxScaleY = 3.0;
      }
    });

    /* Store base values (after tweaks) for slider scaling */
    const baseRates  = systems.map(s => s.emitRate);
    const baseSpeeds = systems.map(s => s.updateSpeed);

    /* ---- Controls ---- */
    const slSpeed    = document.getElementById('sl-speed');
    const slActivity = document.getElementById('sl-activity');
    const cbAutorot  = document.getElementById('cb-autorot');
    const vSpeed     = document.getElementById('v-speed');
    const vAct       = document.getElementById('v-act');
    const rAct       = document.getElementById('r-act');

    slSpeed.oninput = () => {
      const v = parseFloat(slSpeed.value);
      vSpeed.textContent = v.toFixed(1);
      systems.forEach((s, i) => s.updateSpeed = baseSpeeds[i] * v);
    };

    slActivity.oninput = () => {
      const a = parseFloat(slActivity.value);
      vAct.textContent = a.toFixed(2);
      /* Activity drives flares strongly, surface & glare gently */
      systems.forEach((s, i) => {
        const name = s.name.toLowerCase();
        if (name.includes('flare')) {
          s.emitRate = baseRates[i] * Math.pow(a, 3) * 10;  /* cubic: ~0 at low, busy at max */
        } else if (name.includes('glare')) {
          s.emitRate = baseRates[i] * (0.35 + a * 0.55);    /* glare: more glow at max */
        } else {
          s.emitRate = baseRates[i] * (0.6 + a * 0.8);      /* surface: wider range */
        }
      });
      rAct.textContent = a < 0.25 ? 'Low (Minimum)' :
                         a < 0.55 ? 'Moderate' :
                         a < 0.8  ? 'High' : 'Very High (Maximum)';
    };

    slActivity.oninput();

    /* ---- Render loop ---- */
    engine.runRenderLoop(() => {
      if (cbAutorot.checked) {
        camera.alpha -= 0.0008 * parseFloat(slSpeed.value);
      }
      scene.render();
    });

    window.addEventListener('resize', () => engine.resize());
  })();
  </script>
</body>
</html>
