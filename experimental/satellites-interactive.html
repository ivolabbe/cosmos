<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Satellites | COSMOS</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Open Sans", sans-serif; background: #060612; color: #e0e0e0; overflow: hidden; }
    canvas { display: block; }

    /* --- Info panel (top-left) --- */
    #info {
      position: absolute; top: 16px; left: 16px;
      background: rgba(6,6,24,0.92); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 16px 20px; max-width: 340px;
      font-size: 14px; line-height: 1.6; z-index: 10; pointer-events: none;
    }
    #info h2 { font-size: 18px; font-weight: 300; margin-bottom: 6px; color: #fff; }
    #info .desc { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 4px; }
    #info .hint { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 8px; }

    /* --- Embedded mode --- */
    body.embedded #info h2,
    body.embedded #info .desc,
    body.embedded #info .hint { display: none; }
    body.embedded #info { max-width: 220px; padding: 8px 12px; top: 8px; left: 8px; }
    body.embedded #credit { display: none; }

    /* --- Controls bar (bottom) --- */
    #controls {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 10px; flex-wrap: nowrap;
      background: rgba(6,6,24,0.92); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 8px 16px; z-index: 10; max-width: 95vw;
    }
    #controls label { font-size: 11px; display: flex; align-items: center; gap: 4px; white-space: nowrap; cursor: pointer; }
    #controls input[type="checkbox"] { accent-color: #DC2D27; }
    .sep { width: 1px; height: 18px; background: rgba(255,255,255,0.12); flex-shrink: 0; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 2px; }

    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-size: 16px; font-weight: 300; color: rgba(255,255,255,0.4);
      z-index: 20; pointer-events: none;
    }
    #credit {
      position: absolute; bottom: 52px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: rgba(255,255,255,0.25); z-index: 10; pointer-events: none;
    }
    #credit a { color: rgba(255,255,255,0.35); }

    @media (max-width: 700px) {
      #controls { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body>

  <div id="loading">Loading&hellip;</div>

  <div id="info">
    <h2>Satellites &amp; Orbits</h2>
    <p class="desc">14,875 active satellites from the CelesTrak catalogue, colour-coded by orbit type, with global airline routes.</p>
    <p class="hint">Drag to orbit &middot; Scroll to zoom</p>
  </div>

  <div id="controls">
    <label><input type="checkbox" id="cb-leo" checked> <span class="dot" style="background:#44cccc;"></span>LEO</label>
    <label><input type="checkbox" id="cb-meo" checked> <span class="dot" style="background:#ff4444;"></span>MEO</label>
    <label><input type="checkbox" id="cb-geo" checked> <span class="dot" style="background:#4488ff;"></span>GEO</label>
    <label><input type="checkbox" id="cb-heo" checked> <span class="dot" style="background:#44ff66;"></span>HEO</label>
    <div class="sep"></div>
    <label><input type="checkbox" id="cb-routes"> <span class="dot" style="background:#ff2200;"></span>Airlines</label>
    <div class="sep"></div>
    <label><input type="checkbox" id="cb-lights" checked> City lights</label>
    <label><input type="checkbox" id="cb-autorot" checked> Auto-rotate</label>
  </div>

  <div id="credit">Orbits: <a href="https://celestrak.org/" target="_blank">CelesTrak</a> active catalogue. Textures: <a href="https://www.solarsystemscope.com/textures" target="_blank">Solar System Scope</a> (CC BY 4.0).</div>

  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }}
  </script>
  <script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

  /* ---- Embedded mode ---- */
  if (window.self !== window.top) document.body.classList.add('embedded');

  /* ---- Renderer ---- */
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.body.prepend(renderer.domElement);

  /* ---- Scene & Camera ---- */
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(4, 3, 8);
  camera.lookAt(0, 0, 0);

  /* ---- Controls ---- */
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 1.5;
  controls.maxDistance = 100;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.3;

  /* ---- Lights ---- */
  scene.add(new THREE.AmbientLight(0x111122, 0.3));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
  dirLight.position.set(5, 3, 5);
  scene.add(dirLight);

  /* ---- Bloom post-processing ---- */
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight), 0.5, 0.8, 0.5);
  composer.addPass(bloomPass);

  /* ---- Layer references ---- */
  const layers = {};       /* name → THREE.Object3D */
  let earthMesh = null;
  let cityLightsMesh = null;

  /* ---- Colour overrides for line materials ---- */
  const LINE_COLORS = {
    sat_gps_material:   0xff3333,
    sat_comms_material: 0x3377ff,
    sat_tech_material:  0x33cc55,
    sat_earth_material: 0xcccccc,
    routes_material:    0xff2200,
  };

  /* ---- Load glTF ---- */
  const loader = new GLTFLoader();
  const gltf = await loader.loadAsync('models/satellites/export.gltf');
  document.getElementById('loading').style.display = 'none';

  gltf.scene.traverse(child => {
    if (!child.material) return;
    const matName = child.material.name;

    /* Hide model satellite orbits — replaced by real catalog data */
    if ((child.isLineSegments || child.isLine) && matName !== 'routes_material') {
      child.visible = false;
    }

    /* Airline routes: keep with additive blending */
    if (matName === 'routes_material') {
      child.material = new THREE.LineBasicMaterial({
        color: LINE_COLORS[matName], transparent: true, opacity: 0.05,
        blending: THREE.AdditiveBlending, depthWrite: false,
      });
      layers.routes = child;
      child.visible = false;
    }

    if (matName === 'earth') earthMesh = child;
  });

  scene.add(gltf.scene);

  /* ---- Load real satellite orbits from CelesTrak catalog ---- */
  const CATALOG = {
    leo: { file: 'models/satellites/catalog/cat_leo.bin', color: 0x44cccc, opacity: 0.03 },
    meo: { file: 'models/satellites/catalog/cat_meo.bin', color: 0xff4444, opacity: 0.35  },
    geo: { file: 'models/satellites/catalog/cat_geo.bin', color: 0x4488ff, opacity: 0.12  },
    heo: { file: 'models/satellites/catalog/cat_heo.bin', color: 0x44ff66, opacity: 0.5   },
  };
  for (const [cat, cfg] of Object.entries(CATALOG)) {
    const resp = await fetch(cfg.file);
    const buf = await resp.arrayBuffer();
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(buf), 3));
    const mat = new THREE.LineBasicMaterial({
      color: cfg.color, transparent: true, opacity: cfg.opacity,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
    const mesh = new THREE.LineSegments(geo, mat);
    scene.add(mesh);
    layers[cat] = mesh;
  }

  /* ---- Enhance Earth material ---- */
  if (earthMesh) {
    const tl = new THREE.TextureLoader();
    const maxAniso = renderer.capabilities.getMaxAnisotropy();

    /* landmak.png — land/sea mask from glTF (already on the mesh as map).
       We use it for edge-detection coastline outlines via a custom shader. */
    const landTex = earthMesh.material.map;          /* already loaded by GLTFLoader */
    landTex.anisotropy = maxAniso;

    /* Nightmap for city lights */
    const nightTex = tl.load('models/satellites/8k_earth_nightmap.jpg');
    nightTex.flipY = false;
    nightTex.colorSpace = THREE.SRGBColorSpace;
    nightTex.anisotropy = maxAniso;

    /* Replace Earth material with custom shader:
       - Edge-detect landmak.png → white coastline outlines
       - Add nightmap city lights
       - Dark base everywhere else */
    earthMesh.material = new THREE.ShaderMaterial({
      uniforms: {
        landMask: { value: landTex },
        nightMap: { value: nightTex },
        showLights: { value: 1.0 },
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }`,
      fragmentShader: `
        uniform sampler2D landMask;
        uniform sampler2D nightMap;
        uniform float showLights;
        varying vec2 vUv;
        void main() {
          float tx = 0.5 / 2048.0;  /* half-texel for thinner coastlines */
          float c  = texture2D(landMask, vUv).r;

          /* Land detail: show rivers (grey in land areas), suppress ocean (white) */
          float ocean = smoothstep(0.4, 0.6, c);         /* 1=ocean, 0=land */
          float landDetail = c * (1.0 - ocean) * 3.0;    /* amplify river lines */
          vec3 land = vec3(0.2, 0.25, 0.3) * landDetail;

          /* Coastline outlines via edge detection */
          float l  = texture2D(landMask, vUv + vec2(-tx, 0.0)).r;
          float r  = texture2D(landMask, vUv + vec2( tx, 0.0)).r;
          float u  = texture2D(landMask, vUv + vec2(0.0,  tx)).r;
          float d  = texture2D(landMask, vUv + vec2(0.0, -tx)).r;
          float edge = abs(c-l) + abs(c-r) + abs(c-u) + abs(c-d);
          edge = clamp(edge * 1.0, 0.0, 1.0);
          vec3 coastline = vec3(0.5, 0.6, 0.7) * edge;

          /* City lights from nightmap */
          vec3 cities = texture2D(nightMap, vUv).rgb * showLights * 1.8;

          /* Combine: dark base + land rivers + coastlines + city lights */
          vec3 base = vec3(0.01, 0.015, 0.03);
          gl_FragColor = vec4(base + land + coastline + cities, 1.0);
        }`,
    });

    /* Additive city lights overlay for extra glow */
    const lightsMat = new THREE.MeshBasicMaterial({
      map: nightTex,
      color: 0xffffff,
      transparent: true,
      opacity: 0.5,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    cityLightsMesh = new THREE.Mesh(earthMesh.geometry.clone(), lightsMat);
    cityLightsMesh.scale.setScalar(1.003);
    earthMesh.parent.add(cityLightsMesh);

    /* Atmospheric glow — 3 concentric FrontSide layers for realistic falloff:
       bright rim → medium glow → wide diffuse fade.
       Each layer uses a fresnel rim shader with additive blending. */
    const atmosVS = `
      varying vec3 vNormal;
      varying vec3 vViewDir;
      void main() {
        vNormal  = normalize(normalMatrix * normal);
        vec4 mv  = modelViewMatrix * vec4(position, 1.0);
        vViewDir = normalize(-mv.xyz);
        gl_Position = projectionMatrix * mv;
      }`;
    const atmosFS = `
      uniform vec3 color;
      uniform float power;
      uniform float intensity;
      varying vec3 vNormal;
      varying vec3 vViewDir;
      void main() {
        float rim  = 1.0 - max(dot(vNormal, vViewDir), 0.0);
        float glow = pow(rim, power) * intensity;
        gl_FragColor = vec4(color * glow, glow);
      }`;

    /* Atmosphere: single BackSide sphere with ray-based column density.
       For each fragment, compute the view ray's closest approach to Earth.
       Tangential rays → long path through atmosphere → bright limb.
       Radial rays → short path → dim.  Exponential density profile
       gives a smooth, physically-motivated gradient — no banding. */
    /* Atmosphere: single FrontSide sphere. Path length through the
       atmosphere depends on viewing angle — long at the limb (bright
       blue rim), short when face-on (faint haze over surface).
       Optical depth = pathLength × density gives Beer-Lambert opacity. */
    const ATMOS_R = 1.15;
    const atmosGeo = new THREE.SphereGeometry(ATMOS_R, 64, 64);
    const atmosMat = new THREE.ShaderMaterial({
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.FrontSide,
      uniforms: {
        atmosColor:    { value: new THREE.Color(0x4499dd) },
        earthRadius:   { value: 1.005 },
        atmosRadius:   { value: ATMOS_R },
        scaleHeight:   { value: 0.04 },
        intensity:     { value: 3.0 },
      },
      vertexShader: `
        varying vec3 vWorldPos;
        void main() {
          vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }`,
      fragmentShader: `
        uniform vec3  atmosColor;
        uniform float earthRadius;
        uniform float atmosRadius;
        uniform float scaleHeight;
        uniform float intensity;
        varying vec3  vWorldPos;

        void main() {
          vec3 rd = normalize(vWorldPos - cameraPosition);
          vec3 ro = vWorldPos;  /* ray enters atmosphere here */

          /* Find where ray exits: Earth surface or far atmosphere boundary */
          float hb = dot(ro, rd);
          float earthDisc = hb*hb - dot(ro,ro) + earthRadius*earthRadius;
          float pathLen;
          if (earthDisc > 0.0) {
            pathLen = max(-hb - sqrt(earthDisc), 0.0);  /* hits Earth */
          } else {
            pathLen = max(-2.0 * hb, 0.0);              /* exits far side */
          }

          /* Integrate exp(-altitude/H) along the ray (8 samples) */
          float sum = 0.0;
          float dt  = pathLen / 8.0;
          for (int i = 0; i < 8; i++) {
            float t   = (float(i) + 0.5) * dt;
            vec3  p   = ro + rd * t;
            float alt = length(p) - earthRadius;
            sum += exp(-alt / scaleHeight) * dt;
          }

          float alpha = clamp(sum * intensity, 0.0, 1.0);
          gl_FragColor = vec4(atmosColor * alpha, alpha);
        }`,
    });
    scene.add(new THREE.Mesh(atmosGeo, atmosMat));
  }

  /* ---- Controls wiring ---- */
  const cbMap = {
    'cb-leo':     () => layers.leo,
    'cb-meo':     () => layers.meo,
    'cb-geo':     () => layers.geo,
    'cb-heo':     () => layers.heo,
    'cb-routes':  () => layers.routes,
  };

  Object.entries(cbMap).forEach(([id, getFn]) => {
    document.getElementById(id).onchange = function() {
      const obj = getFn();
      if (obj) obj.visible = this.checked;
    };
  });

  document.getElementById('cb-lights').onchange = function() {
    if (cityLightsMesh) cityLightsMesh.visible = this.checked;
    if (earthMesh?.material?.uniforms?.showLights)
      earthMesh.material.uniforms.showLights.value = this.checked ? 1.0 : 0.0;
  };

  document.getElementById('cb-autorot').onchange = function() {
    controls.autoRotate = this.checked;
  };

  /* ---- Animation loop ---- */
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    composer.render();
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
  });
  </script>
</body>
</html>
