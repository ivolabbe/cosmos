<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy Rotation Curves | COSMOS</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Open Sans", sans-serif; background: #000; color: #e0e0e0; overflow: hidden; }
    canvas { display: block; }

    /* --- Info panel (top-left) --- */
    #info {
      position: absolute; top: 16px; left: 16px;
      background: rgba(10,10,46,0.92); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 16px 20px; max-width: 320px;
      font-size: 14px; line-height: 1.6; z-index: 10; pointer-events: none;
    }
    #info h2 { font-size: 18px; font-weight: 300; margin-bottom: 6px; color: #fff; }
    #info .desc { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 4px; }
    #info .hint { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 8px; }
    .readout { margin-top: 10px; font-size: 12px; font-family: "Courier New", monospace; color: rgba(255,255,255,0.8); }
    .readout div { margin-bottom: 2px; }
    .readout span { color: #fff; font-weight: 600; }

    /* --- Embedded mode --- */
    body.embedded #info h2,
    body.embedded #info .desc,
    body.embedded #info .hint { display: none; }
    body.embedded #info { max-width: 200px; padding: 8px 12px; top: 8px; left: 8px; }
    body.embedded #info .readout { margin-top: 0; font-size: 11px; }
    body.embedded #credit { display: none; }

    /* --- Rotation curve panel (top-right) --- */
    #panels {
      position: absolute; top: 16px; right: 16px;
      display: flex; flex-direction: column; gap: 8px; z-index: 10;
    }
    body.embedded #panels { top: 8px; right: 8px; }
    .panel-box {
      background: rgba(10,10,46,0.92); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 10px 12px 6px;
    }
    .panel-box h3 {
      font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.5);
      margin-bottom: 4px; text-align: center;
    }
    .panel-box canvas { display: block; border-radius: 3px; }

    /* --- Controls bar (bottom) --- */
    #controls {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 10px; flex-wrap: nowrap;
      background: rgba(10,10,46,0.9); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 8px 16px; z-index: 10; max-width: 97vw;
    }
    #controls label { font-size: 11px; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
    #controls input[type="range"] { width: 60px; accent-color: #DC2D27; cursor: pointer; }
    #controls input[type="checkbox"] { accent-color: #DC2D27; }
    #controls select {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 3px 6px; border-radius: 4px; font-family: inherit; font-size: 11px;
    }
    #controls button {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 4px 10px; border-radius: 4px; font-family: inherit; font-size: 11px; cursor: pointer;
    }
    #controls button:hover { background: rgba(255,255,255,0.18); }
    #controls button.active { background: rgba(220,45,39,0.5); border-color: #DC2D27; }
    .val { min-width: 28px; text-align: right; display: inline-block; font-size: 11px; }
    .sep { width: 1px; height: 18px; background: rgba(255,255,255,0.12); flex-shrink: 0; }

    #credit {
      position: absolute; bottom: 52px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: rgba(255,255,255,0.25); z-index: 10; pointer-events: none;
      white-space: nowrap;
    }

    @media (max-width: 700px) {
      #controls { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body>

  <div id="info">
    <h2>Galaxy Rotation Curves</h2>
    <p class="desc">Why don't outer stars fly away? Dark matter holds galaxies together.</p>
    <div class="readout">
      <div>Dark Matter: <span id="r-dm">100%</span></div>
      <div>Visible Mass: <span id="r-vm">1.0x</span></div>
      <div>v(8 kpc): <span id="r-v8">---</span> km/s</div>
      <div>v(20 kpc): <span id="r-v20">---</span> km/s</div>
    </div>
    <p class="hint">Drag to orbit &middot; Scroll to zoom &middot; Adjust sliders below</p>
  </div>

  <div id="panels">
    <div class="panel-box">
      <h3>Rotation Curve v(R)</h3>
      <canvas id="rc-canvas" width="300" height="250"></canvas>
    </div>
  </div>

  <div id="controls">
    <button id="btn-play" class="active">&#9646;&#9646; Pause</button>
    <div class="sep"></div>
    <label>DM <input type="range" id="dm-slider" min="0" max="100" value="100" step="1">
      <span class="val" id="dm-val">100%</span></label>
    <label>Mass <input type="range" id="vm-slider" min="50" max="200" value="100" step="5">
      <span class="val" id="vm-val">1.0x</span></label>
    <div class="sep"></div>
    <label>Speed
      <select id="speed-sel">
        <option value="0.5">0.5x</option>
        <option value="1" selected>1x</option>
        <option value="3">3x</option>
        <option value="10">10x</option>
      </select>
    </label>
    <div class="sep"></div>
    <label><input type="checkbox" id="cb-keplerian"> Kepler</label>
    <label><input type="checkbox" id="cb-solid"> Solid</label>
    <label><input type="checkbox" id="cb-flat"> Flat</label>
    <label><input type="checkbox" id="cb-labels" checked> Labels</label>
  </div>

  <div id="credit">COSMOS &middot; Swinburne Astronomy Online</div>

  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }}
  </script>
  <script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
  import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

  // ===================================================================
  //  Embedded mode
  // ===================================================================
  if (window.self !== window.top) document.body.classList.add('embedded');

  // ===================================================================
  //  Constants
  // ===================================================================
  const PI = Math.PI, TWO_PI = 2 * PI;

  // G in units where [M] = 10^10 Msun, [R] = kpc, [v] = km/s
  // G = 4.302e-3 pc (km/s)^2 / Msun = 4.302e-3 * 1e3 * 1e10 kpc (km/s)^2 / (10^10 Msun)
  const G_UNIT = 4.302e-3 * 1e3;  // = 4.302 kpc (km/s)^2 / (10^10 Msun)
  // But masses are in 10^10 Msun, so: v^2 = G_UNIT * M * 1e10 / R ... wait
  // Let's be careful. G = 4.302e-3 pc (km/s)^2 / Msun
  // Convert pc to kpc: G = 4.302e-3 * 1e3 kpc (km/s)^2 / (1e3 Msun) ... no.
  // 1 kpc = 1000 pc => 1 pc = 1e-3 kpc
  // G = 4.302e-3 (pc) (km/s)^2 / Msun = 4.302e-3 * 1e-3 (kpc) (km/s)^2 / Msun
  //   = 4.302e-6 kpc (km/s)^2 / Msun
  // For M in 10^10 Msun: G*M = 4.302e-6 * M * 1e10 = 4.302e4 * M [kpc (km/s)^2]
  // So v^2 = G'*M/R with G' = 4.302e4 when M is in 10^10 Msun and R in kpc, v in km/s
  const G_ = 4.302e4;  // kpc (km/s)^2 per 10^10 Msun

  // Default mass model parameters
  const DEF = {
    Mb: 1.5,    // bulge mass in 10^10 Msun
    ab: 0.5,    // bulge scale radius in kpc
    Md: 5.0,    // disk mass in 10^10 Msun
    Rd: 2.6,    // disk scale length in kpc
    rho0: 0.035e-10, // halo central density in 10^10 Msun / kpc^3
    // 0.035 Msun/pc^3 = 0.035 * 1e9 Msun/kpc^3 = 3.5e7 Msun/kpc^3 = 3.5e-3 in 10^10 Msun/kpc^3
    Rc: 5.0,    // halo core radius in kpc
  };
  // Fix rho0 units: 0.035 Msun/pc^3 = 0.035 * (1e3)^3 Msun/kpc^3 = 0.035e9 Msun/kpc^3 = 3.5e7 Msun/kpc^3
  // In 10^10 Msun/kpc^3: 3.5e7 / 1e10 = 3.5e-3
  DEF.rho0 = 3.5e-3;

  // ===================================================================
  //  Modified Bessel functions — Abramowitz & Stegun polynomial fits
  // ===================================================================
  function besselI0(x) {
    if (x < 0) x = -x;
    if (x < 3.75) {
      const t = (x / 3.75) ** 2;
      return 1 + 3.5156229*t + 3.0899424*t**2 + 1.2067492*t**3
               + 0.2659732*t**4 + 0.0360768*t**5 + 0.0045813*t**6;
    }
    const t = 3.75 / x;
    return (Math.exp(x) / Math.sqrt(x)) * (0.39894228 + 0.01328592*t
      + 0.00225319*t**2 - 0.00157565*t**3 + 0.00916281*t**4
      - 0.02057706*t**5 + 0.02635537*t**6 - 0.01647633*t**7 + 0.00392377*t**8);
  }

  function besselI1(x) {
    if (x < 0) return -besselI1(-x);
    if (x < 3.75) {
      const t = (x / 3.75) ** 2;
      return x * (0.5 + 0.87890594*t + 0.51498869*t**2 + 0.15084934*t**3
                     + 0.02658733*t**4 + 0.00301532*t**5 + 0.00032411*t**6);
    }
    const t = 3.75 / x;
    return (Math.exp(x) / Math.sqrt(x)) * (0.39894228 - 0.03988024*t
      - 0.00362018*t**2 + 0.00163801*t**3 - 0.01031555*t**4
      + 0.02282967*t**5 - 0.02895312*t**6 + 0.01787654*t**7 - 0.00420059*t**8);
  }

  function besselK0(x) {
    if (x <= 2) {
      const t = (x / 2) ** 2;
      return -Math.log(x / 2) * besselI0(x) + (-0.57721566 + 0.42278420*t
        + 0.23069756*t**2 + 0.03488590*t**3 + 0.00262698*t**4
        + 0.00010750*t**5 + 0.00000740*t**6);
    }
    const t = 2 / x;
    return (Math.exp(-x) / Math.sqrt(x)) * (1.25331414 - 0.07832358*t
      + 0.02189568*t**2 - 0.01062446*t**3 + 0.00587872*t**4
      - 0.00251540*t**5 + 0.00053208*t**6);
  }

  function besselK1(x) {
    if (x <= 2) {
      const t = (x / 2) ** 2;
      return Math.log(x / 2) * besselI1(x) + (1 / x) * (1 + 0.15443144*t
        - 0.67278579*t**2 - 0.18156897*t**3 - 0.01919402*t**4
        - 0.00110404*t**5 - 0.00004686*t**6);
    }
    const t = 2 / x;
    return (Math.exp(-x) / Math.sqrt(x)) * (1.25331414 + 0.23498619*t
      - 0.03655620*t**2 + 0.01504268*t**3 - 0.00780353*t**4
      + 0.00325614*t**5 - 0.00068245*t**6);
  }

  // ===================================================================
  //  Rotation curve physics
  // ===================================================================
  function vBulge(R, Mb, ab) {
    if (R < 1e-6) return 0;
    return Math.sqrt(G_ * Mb * R / (R + ab) ** 2);
  }

  function vDisk(R, Md, Rd) {
    const y = R / (2 * Rd);
    if (y < 1e-8) return 0;
    // Freeman disk: v^2 = (G*Md)/(2*Rd) * (2*y^2) * [I0(y)*K0(y) - I1(y)*K1(y)]
    const bess = besselI0(y) * besselK0(y) - besselI1(y) * besselK1(y);
    const v2 = 0.5 * G_ * Md / Rd * (2 * y * y) * bess;
    return Math.sqrt(Math.max(v2, 0));
  }

  function vHalo(R, rho0, Rc) {
    if (R < 1e-6) return 0;
    // v^2 = 4*pi*G*rho0*Rc^2 * (1 - (Rc/R)*atan(R/Rc))
    const v2 = 4 * PI * G_ * rho0 * Rc * Rc * (1 - (Rc / R) * Math.atan(R / Rc));
    return Math.sqrt(Math.max(v2, 0));
  }

  function vTotal(R, fDM, fVM) {
    const vb = vBulge(R, DEF.Mb * fVM, DEF.ab);
    const vd = vDisk(R, DEF.Md * fVM, DEF.Rd);
    const vh = vHalo(R, DEF.rho0, DEF.Rc);
    return Math.sqrt(vb * vb + vd * vd + fDM * vh * vh);
  }

  // Verify: vTotal(8, 1, 1) should be ~220 km/s
  // We'll tune rho0 if needed after first check
  let v8check = vTotal(8.2, 1.0, 1.0);
  console.log('v(8.2 kpc) =', v8check.toFixed(1), 'km/s (target ~220)');
  // Tune rho0 to get v_total(8.2) closer to 220 if needed
  // Iterative approach:
  {
    let targetV = 220;
    let bestRho = DEF.rho0;
    for (let trial = 0; trial < 20; trial++) {
      const vb = vBulge(8.2, DEF.Mb, DEF.ab);
      const vd = vDisk(8.2, DEF.Md, DEF.Rd);
      const vhTarget = Math.sqrt(Math.max(targetV * targetV - vb * vb - vd * vd, 0));
      // vHalo(R) = sqrt(4*pi*G*rho0*Rc^2*(1-(Rc/R)*atan(R/Rc)))
      // vhTarget^2 = 4*pi*G*rho0*Rc^2 * factor
      const factor = 1 - (DEF.Rc / 8.2) * Math.atan(8.2 / DEF.Rc);
      bestRho = (vhTarget * vhTarget) / (4 * PI * G_ * DEF.Rc * DEF.Rc * factor);
      DEF.rho0 = bestRho;
    }
    console.log('Tuned rho0 =', DEF.rho0.toExponential(4), '(10^10 Msun/kpc^3)');
    console.log('v(8.2 kpc) =', vTotal(8.2, 1.0, 1.0).toFixed(1), 'km/s after tuning');
    console.log('v(5 kpc)   =', vTotal(5, 1.0, 1.0).toFixed(1), 'km/s');
    console.log('v(15 kpc)  =', vTotal(15, 1.0, 1.0).toFixed(1), 'km/s');
    console.log('v(25 kpc)  =', vTotal(25, 1.0, 1.0).toFixed(1), 'km/s');
  }

  // ===================================================================
  //  State
  // ===================================================================
  let fDM = 1.0, fVM = 1.0;
  let playing = true, speedMul = 1.0;
  let simTime = 0; // in Myr

  // ===================================================================
  //  Three.js setup
  // ===================================================================
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 500);
  camera.position.set(0, 18, 0.01);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 4;
  controls.maxDistance = 40;

  // Bloom
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloom = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight), 0.4, 0.6, 0.35
  );
  composer.addPass(bloom);
  composer.addPass(new OutputPass());

  // ===================================================================
  //  Galaxy particle system
  // ===================================================================
  const N_PARTICLES = 6000;
  const N_ARMS = 2;
  const WIND_FACTOR = 0.6;  // tightness of spiral winding
  const ARM_SIGMA = 0.3;    // radial spread around arm ridge (radians)
  const R_INNER = 0.3;      // innermost particle radius (kpc)
  const R_OUTER = 22;       // outermost particle radius (kpc)
  const BULGE_FRAC = 0.15;  // fraction of particles in bulge

  // Visual scale: 1 kpc = 0.5 scene units
  const KPC_TO_VIS = 0.5;

  // Gaussian random (Box-Muller)
  function gaussRand() {
    let u, v;
    do { u = Math.random(); } while (u < 1e-10);
    v = Math.random();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(TWO_PI * v);
  }

  // Generate particle data
  const particles = [];
  for (let i = 0; i < N_PARTICLES; i++) {
    let R, theta;

    if (i < N_PARTICLES * BULGE_FRAC) {
      // Bulge particles: Hernquist-like radial distribution (concentrated)
      const u = Math.random();
      R = DEF.ab * Math.sqrt(u) / (1 - Math.sqrt(u) + 0.01);
      R = Math.min(R, 3.0); // cap bulge extent
      R = Math.max(R, 0.05);
      theta = Math.random() * TWO_PI; // isotropic in bulge
    } else {
      // Disk particles: exponential radial distribution
      // CDF inversion: R = -Rd * ln(1 - u) but we want to cap
      const u = Math.random();
      R = -DEF.Rd * Math.log(1 - u * 0.9999);
      R = Math.max(R, R_INNER);
      R = Math.min(R, R_OUTER);

      // Spiral arm assignment
      const armIdx = Math.floor(Math.random() * N_ARMS);
      const armAngle = (TWO_PI * armIdx / N_ARMS) + WIND_FACTOR * Math.log(R / R_INNER);
      theta = armAngle + gaussRand() * ARM_SIGMA;
      // Additional inter-arm scatter for realism
      if (Math.random() < 0.25) {
        theta = Math.random() * TWO_PI; // some diffuse background particles
      }
    }

    const omega = vTotal(R, 1.0, 1.0) / R; // angular velocity in km/s / kpc
    // Convert to rad/Myr: omega (km/s / kpc) * (3.086e16 km / kpc)^-1 * (3.156e13 s / Myr)
    // omega_rad_per_Myr = omega_kms_per_kpc * 1.022e-3
    // 1 km/s/kpc = 1 / 3.086e16 rad/s * 3.086e16... let me think
    // v = omega * R => omega = v/R in rad/time
    // If v in km/s, R in kpc = 3.086e16 km
    // omega = v / (R * 3.086e16) rad/s = v / (R * 3.086e16) * 3.156e13 * 1e6 rad/Myr
    // = v / R * (3.156e19 / 3.086e16) = v / R * 1022.7
    // Wait: 1 Myr = 1e6 * 3.156e7 s = 3.156e13 s
    // omega (rad/s) = (v km/s) / (R kpc * 3.086e16 km/kpc)
    // omega (rad/Myr) = omega(rad/s) * 3.156e13
    // = v / (R * 3.086e16) * 3.156e13
    // = v / R * (3.156e13 / 3.086e16)
    // = v / R * 1.0227e-3
    const omega_myr = omega * 1.0227e-3; // rad/Myr

    particles.push({
      R,
      theta,
      omega_myr,
      isBulge: i < N_PARTICLES * BULGE_FRAC,
    });
  }

  // Create Points geometry
  const posArr = new Float32Array(N_PARTICLES * 3);
  const colArr = new Float32Array(N_PARTICLES * 3);
  const sizeArr = new Float32Array(N_PARTICLES);

  // Color ramp: warm center -> blue-white arms -> dim outer
  const colCenter = new THREE.Color(0xffeedd);
  const colMid = new THREE.Color(0xaabbff);
  const colOuter = new THREE.Color(0x5577aa);
  const colBulge = new THREE.Color(0xffddaa);

  for (let i = 0; i < N_PARTICLES; i++) {
    const p = particles[i];
    const t = Math.min(p.R / R_OUTER, 1);

    let col;
    if (p.isBulge) {
      col = colBulge.clone().lerp(colCenter, Math.min(p.R / 2, 1));
    } else if (t < 0.3) {
      col = colCenter.clone().lerp(colMid, t / 0.3);
    } else {
      col = colMid.clone().lerp(colOuter, (t - 0.3) / 0.7);
    }
    colArr[i * 3] = col.r;
    colArr[i * 3 + 1] = col.g;
    colArr[i * 3 + 2] = col.b;

    // Size: larger near center, smaller at outskirts
    sizeArr[i] = p.isBulge ? 0.12 : Math.max(0.04, 0.10 - t * 0.06);
  }

  const galaxyGeo = new THREE.BufferGeometry();
  galaxyGeo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
  galaxyGeo.setAttribute('color', new THREE.BufferAttribute(colArr, 3));
  galaxyGeo.setAttribute('size', new THREE.BufferAttribute(sizeArr, 1));

  // Custom shader for sized + colored points with glow
  const galaxyMat = new THREE.ShaderMaterial({
    uniforms: {
      uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) },
    },
    vertexShader: `
      attribute float size;
      varying vec3 vColor;
      uniform float uPixelRatio;
      void main() {
        vColor = color;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        float alpha = 1.0 - smoothstep(0.0, 1.0, d);
        alpha *= 0.85;
        gl_FragColor = vec4(vColor, alpha);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    vertexColors: true,
  });

  const galaxyPoints = new THREE.Points(galaxyGeo, galaxyMat);
  scene.add(galaxyPoints);

  // Central glow (bulge glow)
  const glowGeo = new THREE.SphereGeometry(0.8, 32, 32);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0xffddaa, transparent: true, opacity: 0.08,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  scene.add(new THREE.Mesh(glowGeo, glowMat));
  // Brighter inner glow
  const glowMat2 = new THREE.MeshBasicMaterial({
    color: 0xffeedd, transparent: true, opacity: 0.15,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(0.35, 32, 32), glowMat2));

  // ===================================================================
  //  Background stars (two-layer)
  // ===================================================================
  function makeStars(count, rMin, rMax, size, opacity) {
    const pos = [];
    for (let i = 0; i < count; i++) {
      const th = Math.random() * TWO_PI;
      const ph = Math.acos(2 * Math.random() - 1);
      const r = rMin + Math.random() * (rMax - rMin);
      pos.push(r * Math.sin(ph) * Math.cos(th), r * Math.sin(ph) * Math.sin(th), r * Math.cos(ph));
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    return new THREE.Points(g, new THREE.PointsMaterial({
      color: 0xffffff, size, transparent: true, opacity, sizeAttenuation: false,
    }));
  }
  scene.add(makeStars(800, 50, 120, 1.2, 0.3));  // dim layer
  scene.add(makeStars(80, 40, 100, 2.0, 0.9));    // bright layer (triggers bloom)

  // ===================================================================
  //  Zone labels (3D text sprites)
  // ===================================================================
  const labelSprites = [];
  function makeZoneLabel(text, x, z, color) {
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 48;
    const ctx = canvas.getContext('2d');
    ctx.font = '600 22px "Open Sans", sans-serif';
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 6;
    ctx.fillText(text, 128, 24);
    const tex = new THREE.CanvasTexture(canvas);
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.6, depthWrite: false });
    const sprite = new THREE.Sprite(mat);
    sprite.position.set(x * KPC_TO_VIS, 0.05, z * KPC_TO_VIS);
    sprite.scale.set(3, 0.6, 1);
    scene.add(sprite);
    labelSprites.push(sprite);
    return sprite;
  }
  makeZoneLabel('BULGE', 0, -1.2, '#ffddaa');
  makeZoneLabel('DISK', 0, -5, '#aabbff');
  makeZoneLabel('DARK MATTER HALO', 0, -13, '#dd88dd');

  // ===================================================================
  //  Update particle positions
  // ===================================================================
  function updateParticles(dt) {
    const pos = galaxyGeo.attributes.position.array;
    for (let i = 0; i < N_PARTICLES; i++) {
      const p = particles[i];
      p.theta += p.omega_myr * dt;
      const vis = p.R * KPC_TO_VIS;
      pos[i * 3]     = vis * Math.cos(p.theta);
      pos[i * 3 + 1] = (Math.random() - 0.5) * 0.02; // tiny vertical scatter
      pos[i * 3 + 2] = vis * Math.sin(p.theta);
    }
    galaxyGeo.attributes.position.needsUpdate = true;
  }

  // Recompute angular velocities when DM or VM changes
  function recomputeOmegas() {
    for (let i = 0; i < N_PARTICLES; i++) {
      const p = particles[i];
      const v = vTotal(p.R, fDM, fVM);
      p.omega_myr = (v / p.R) * 1.0227e-3;
    }
  }

  // Initial position update
  updateParticles(0);

  // ===================================================================
  //  2D Rotation Curve Canvas
  // ===================================================================
  const rcCanvas = document.getElementById('rc-canvas');
  const rcCtx = rcCanvas.getContext('2d');
  const rcW = rcCanvas.width, rcH = rcCanvas.height;
  const rcPad = { left: 42, right: 12, top: 16, bottom: 28 };
  const plotW = rcW - rcPad.left - rcPad.right;
  const plotH = rcH - rcPad.top - rcPad.bottom;
  const R_MAX_PLOT = 25;  // kpc
  const V_MAX_PLOT = 350; // km/s

  function rToX(R) { return rcPad.left + (R / R_MAX_PLOT) * plotW; }
  function vToY(v) { return rcPad.top + plotH - (v / V_MAX_PLOT) * plotH; }

  // Simulated observed data points (scattered along 100% DM curve)
  const obsData = [];
  {
    const obsRadii = [1, 2, 3, 4, 5, 6, 7, 8, 10, 12, 14, 16, 18, 20, 22, 24];
    for (const R of obsRadii) {
      const v = vTotal(R, 1.0, 1.0);
      const err = 8 + Math.random() * 12;
      obsData.push({ R, v: v + (Math.random() - 0.5) * err * 1.5, err });
    }
  }

  // Toggle states for reference curves
  let showKeplerian = false, showSolid = false, showFlat = false;

  function drawRotationCurve() {
    rcCtx.clearRect(0, 0, rcW, rcH);

    // Background
    rcCtx.fillStyle = 'rgba(5, 5, 20, 0.95)';
    rcCtx.fillRect(0, 0, rcW, rcH);

    // Grid
    rcCtx.strokeStyle = 'rgba(255,255,255,0.06)';
    rcCtx.lineWidth = 0.5;
    for (let v = 50; v <= 300; v += 50) {
      rcCtx.beginPath();
      rcCtx.moveTo(rcPad.left, vToY(v));
      rcCtx.lineTo(rcPad.left + plotW, vToY(v));
      rcCtx.stroke();
    }
    for (let R = 5; R <= 20; R += 5) {
      rcCtx.beginPath();
      rcCtx.moveTo(rToX(R), rcPad.top);
      rcCtx.lineTo(rToX(R), rcPad.top + plotH);
      rcCtx.stroke();
    }

    // Axes
    rcCtx.strokeStyle = 'rgba(255,255,255,0.3)';
    rcCtx.lineWidth = 1;
    rcCtx.beginPath();
    rcCtx.moveTo(rcPad.left, rcPad.top);
    rcCtx.lineTo(rcPad.left, rcPad.top + plotH);
    rcCtx.lineTo(rcPad.left + plotW, rcPad.top + plotH);
    rcCtx.stroke();

    // Axis labels
    rcCtx.fillStyle = 'rgba(255,255,255,0.5)';
    rcCtx.font = '9px "Open Sans", sans-serif';
    rcCtx.textAlign = 'center';
    for (let R = 0; R <= 25; R += 5) {
      rcCtx.fillText(R, rToX(R), rcPad.top + plotH + 14);
    }
    rcCtx.fillText('R (kpc)', rcPad.left + plotW / 2, rcPad.top + plotH + 25);

    rcCtx.textAlign = 'right';
    for (let v = 0; v <= 300; v += 100) {
      rcCtx.fillText(v, rcPad.left - 4, vToY(v) + 3);
    }
    rcCtx.save();
    rcCtx.translate(10, rcPad.top + plotH / 2);
    rcCtx.rotate(-PI / 2);
    rcCtx.textAlign = 'center';
    rcCtx.fillText('v (km/s)', 0, 0);
    rcCtx.restore();

    // Draw a curve helper
    function drawCurve(fn, color, lineWidth, dashed) {
      rcCtx.strokeStyle = color;
      rcCtx.lineWidth = lineWidth;
      if (dashed) rcCtx.setLineDash(dashed);
      else rcCtx.setLineDash([]);
      rcCtx.beginPath();
      let started = false;
      for (let px = 0; px <= plotW; px += 1) {
        const R = (px / plotW) * R_MAX_PLOT;
        if (R < 0.1) continue;
        const v = fn(R);
        const x = rcPad.left + px;
        const y = vToY(v);
        if (!started) { rcCtx.moveTo(x, y); started = true; }
        else rcCtx.lineTo(x, y);
      }
      rcCtx.stroke();
      rcCtx.setLineDash([]);
    }

    // Component curves (dashed)
    // Bulge
    drawCurve(R => vBulge(R, DEF.Mb * fVM, DEF.ab), 'rgba(255,160,60,0.7)', 1, [4, 3]);
    // Disk
    drawCurve(R => vDisk(R, DEF.Md * fVM, DEF.Rd), 'rgba(80,200,220,0.7)', 1, [4, 3]);
    // Halo (scaled by fDM)
    drawCurve(R => {
      const vh = vHalo(R, DEF.rho0, DEF.Rc);
      return vh * Math.sqrt(fDM);
    }, 'rgba(220,100,220,0.7)', 1, [4, 3]);

    // Total (solid white, thick)
    drawCurve(R => vTotal(R, fDM, fVM), '#ffffff', 2.0, null);

    // Reference curves (toggles)
    if (showKeplerian) {
      const Mvis = (DEF.Mb + DEF.Md) * fVM;
      drawCurve(R => Math.sqrt(G_ * Mvis / R), 'rgba(255,80,80,0.6)', 1, [6, 4]);
    }
    if (showSolid) {
      drawCurve(R => 220 * R / 8.2, 'rgba(80,255,80,0.6)', 1, [6, 4]);
    }
    if (showFlat) {
      drawCurve(R => 220, 'rgba(255,220,60,0.6)', 1, [6, 4]);
    }

    // Observed data points (always shown)
    for (const d of obsData) {
      const x = rToX(d.R), y = vToY(d.v);
      // Error bar
      rcCtx.strokeStyle = 'rgba(255,255,255,0.35)';
      rcCtx.lineWidth = 0.8;
      rcCtx.beginPath();
      rcCtx.moveTo(x, vToY(d.v + d.err));
      rcCtx.lineTo(x, vToY(d.v - d.err));
      rcCtx.stroke();
      // Caps
      rcCtx.beginPath();
      rcCtx.moveTo(x - 2, vToY(d.v + d.err));
      rcCtx.lineTo(x + 2, vToY(d.v + d.err));
      rcCtx.moveTo(x - 2, vToY(d.v - d.err));
      rcCtx.lineTo(x + 2, vToY(d.v - d.err));
      rcCtx.stroke();
      // Point
      rcCtx.fillStyle = '#ffffff';
      rcCtx.beginPath();
      rcCtx.arc(x, y, 2.5, 0, TWO_PI);
      rcCtx.fill();
    }

    // Legend
    const legX = rcPad.left + 6, legY = rcPad.top + 4;
    rcCtx.font = '8px "Open Sans", sans-serif';
    const legends = [
      { color: 'rgba(255,160,60,0.9)', label: 'Bulge', dash: true },
      { color: 'rgba(80,200,220,0.9)', label: 'Disk', dash: true },
      { color: 'rgba(220,100,220,0.9)', label: 'Halo', dash: true },
      { color: '#ffffff', label: 'Total', dash: false },
    ];
    legends.forEach((l, i) => {
      const y = legY + i * 11;
      rcCtx.strokeStyle = l.color;
      rcCtx.lineWidth = l.dash ? 1 : 1.5;
      rcCtx.setLineDash(l.dash ? [3, 2] : []);
      rcCtx.beginPath();
      rcCtx.moveTo(legX, y + 4);
      rcCtx.lineTo(legX + 16, y + 4);
      rcCtx.stroke();
      rcCtx.setLineDash([]);
      rcCtx.fillStyle = l.color;
      rcCtx.textAlign = 'left';
      rcCtx.fillText(l.label, legX + 20, y + 7);
    });

    // Additional reference curve legends if active
    let refLegY = legY + legends.length * 11 + 2;
    if (showKeplerian) {
      rcCtx.strokeStyle = 'rgba(255,80,80,0.8)';
      rcCtx.setLineDash([4, 3]);
      rcCtx.lineWidth = 1;
      rcCtx.beginPath(); rcCtx.moveTo(legX, refLegY + 4); rcCtx.lineTo(legX + 16, refLegY + 4); rcCtx.stroke();
      rcCtx.setLineDash([]);
      rcCtx.fillStyle = 'rgba(255,80,80,0.8)';
      rcCtx.fillText('Keplerian', legX + 20, refLegY + 7);
      refLegY += 11;
    }
    if (showSolid) {
      rcCtx.strokeStyle = 'rgba(80,255,80,0.8)';
      rcCtx.setLineDash([4, 3]);
      rcCtx.lineWidth = 1;
      rcCtx.beginPath(); rcCtx.moveTo(legX, refLegY + 4); rcCtx.lineTo(legX + 16, refLegY + 4); rcCtx.stroke();
      rcCtx.setLineDash([]);
      rcCtx.fillStyle = 'rgba(80,255,80,0.8)';
      rcCtx.fillText('Solid body', legX + 20, refLegY + 7);
      refLegY += 11;
    }
    if (showFlat) {
      rcCtx.strokeStyle = 'rgba(255,220,60,0.8)';
      rcCtx.setLineDash([4, 3]);
      rcCtx.lineWidth = 1;
      rcCtx.beginPath(); rcCtx.moveTo(legX, refLegY + 4); rcCtx.lineTo(legX + 16, refLegY + 4); rcCtx.stroke();
      rcCtx.setLineDash([]);
      rcCtx.fillStyle = 'rgba(255,220,60,0.8)';
      rcCtx.fillText('Flat (220)', legX + 20, refLegY + 7);
    }
  }

  // ===================================================================
  //  Controls wiring
  // ===================================================================
  const btnPlay = document.getElementById('btn-play');
  btnPlay.addEventListener('click', () => {
    playing = !playing;
    btnPlay.innerHTML = playing ? '&#9646;&#9646; Pause' : '&#9654; Play';
    btnPlay.classList.toggle('active', playing);
  });

  document.getElementById('speed-sel').addEventListener('change', e => {
    speedMul = parseFloat(e.target.value);
  });

  const dmSlider = document.getElementById('dm-slider');
  const dmVal = document.getElementById('dm-val');
  dmSlider.addEventListener('input', () => {
    fDM = parseInt(dmSlider.value) / 100;
    dmVal.textContent = dmSlider.value + '%';
    document.getElementById('r-dm').textContent = dmSlider.value + '%';
    recomputeOmegas();
    drawRotationCurve();
  });

  const vmSlider = document.getElementById('vm-slider');
  const vmVal = document.getElementById('vm-val');
  vmSlider.addEventListener('input', () => {
    fVM = parseInt(vmSlider.value) / 100;
    vmVal.textContent = fVM.toFixed(1) + 'x';
    document.getElementById('r-vm').textContent = fVM.toFixed(1) + 'x';
    recomputeOmegas();
    drawRotationCurve();
  });

  document.getElementById('cb-keplerian').addEventListener('change', e => {
    showKeplerian = e.target.checked;
    drawRotationCurve();
  });
  document.getElementById('cb-solid').addEventListener('change', e => {
    showSolid = e.target.checked;
    drawRotationCurve();
  });
  document.getElementById('cb-flat').addEventListener('change', e => {
    showFlat = e.target.checked;
    drawRotationCurve();
  });
  document.getElementById('cb-labels').addEventListener('change', e => {
    labelSprites.forEach(s => s.visible = e.target.checked);
  });

  // ===================================================================
  //  Readouts
  // ===================================================================
  function updateReadouts() {
    document.getElementById('r-v8').textContent = vTotal(8, fDM, fVM).toFixed(0);
    document.getElementById('r-v20').textContent = vTotal(20, fDM, fVM).toFixed(0);
  }

  // ===================================================================
  //  Animation loop
  // ===================================================================
  let lastTime = 0;
  const BASE_DT = 3.0; // Myr per frame at 1x speed (at 60fps: ~180 Myr/s wall time)

  function animate(now) {
    requestAnimationFrame(animate);

    const elapsed = Math.min((now - lastTime) / 1000, 0.05); // cap delta to avoid jumps
    lastTime = now;

    if (playing) {
      const dt = BASE_DT * speedMul * elapsed * 60; // normalize to ~60fps
      simTime += dt;
      updateParticles(dt);
    }

    controls.update();
    composer.render();
  }

  // Initial draws
  drawRotationCurve();
  updateReadouts();
  updateParticles(0);

  requestAnimationFrame(animate);

  // ===================================================================
  //  Resize handler
  // ===================================================================
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
    bloom.resolution.set(window.innerWidth, window.innerHeight);
    galaxyMat.uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio, 2);
  });

  </script>
</body>
</html>
