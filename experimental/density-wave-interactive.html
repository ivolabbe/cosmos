<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Density Wave Model | COSMOS</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Open Sans", sans-serif; background: #000; color: #e0e0e0; overflow: hidden; }
    canvas { display: block; }

    /* --- Info panel (top-left) --- */
    #info {
      position: absolute; top: 16px; left: 16px;
      background: rgba(10,10,46,0.92); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 18px 24px; max-width: 380px;
      font-size: 15px; line-height: 1.6; z-index: 10; pointer-events: none;
    }
    #info h2 { font-size: 20px; font-weight: 300; margin-bottom: 6px; color: #fff; }
    #info .desc { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 4px; }
    #info .hint { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 8px; }
    .readout { margin-top: 10px; font-size: 13px; font-family: "Courier New", monospace; color: rgba(255,255,255,0.8); }
    .readout div { margin-bottom: 2px; }
    .readout span { color: #fff; font-weight: 600; }

    /* --- Embedded mode --- */
    body.embedded #info h2,
    body.embedded #info .desc,
    body.embedded #info .hint { display: none; }
    body.embedded #info { max-width: 200px; padding: 8px 12px; top: 8px; left: 8px; font-size: 13px; }
    body.embedded #info .readout { margin-top: 0; font-size: 11px; }
    body.embedded #credit { display: none; }
    body.embedded #panels { top: 8px; right: 8px; }
    body.embedded #omega-canvas { width: 240px; height: 140px; }

    /* --- Omega panel (top-right) --- */
    #panels {
      position: absolute; top: 16px; right: 16px;
      display: flex; flex-direction: column; gap: 8px; z-index: 10;
    }
    .panel-box {
      background: rgba(10,10,46,0.92); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 10px 12px 6px;
    }
    .panel-box h3 {
      font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.5);
      margin-bottom: 4px; text-align: center;
    }
    .panel-box canvas { display: block; border-radius: 3px; }

    /* --- Controls bar (bottom) --- */
    #controls {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 10px; flex-wrap: nowrap;
      background: rgba(10,10,46,0.9); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 8px 16px; z-index: 10; max-width: 97vw;
    }
    #controls label { font-size: 11px; display: flex; align-items: center; gap: 4px; white-space: nowrap; cursor: pointer; }
    #controls input[type="range"] { width: 55px; accent-color: #DC2D27; cursor: pointer; }
    #controls input[type="checkbox"] { accent-color: #DC2D27; }
    #controls select {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 3px 6px; border-radius: 4px; font-family: inherit; font-size: 11px;
    }
    #controls button {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 4px 10px; border-radius: 4px; font-family: inherit; font-size: 11px; cursor: pointer;
    }
    #controls button:hover { background: rgba(255,255,255,0.18); }
    #controls button.active { background: rgba(220,45,39,0.5); border-color: #DC2D27; }
    .val { min-width: 28px; text-align: right; display: inline-block; font-size: 11px; }
    .sep { width: 1px; height: 18px; background: rgba(255,255,255,0.12); flex-shrink: 0; }

    #credit {
      position: absolute; bottom: 52px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: rgba(255,255,255,0.25); z-index: 10; pointer-events: none;
      white-space: nowrap;
    }

    @media (max-width: 700px) {
      #controls { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body>

  <div id="info">
    <h2>Density Wave Model</h2>
    <p class="desc">Spiral arms are density waves &mdash; stars flow through them like traffic through a jam.</p>
    <div class="readout">
      <div>&Omega;<sub>p</sub>: <span id="r-omegap">25</span> km/s/kpc</div>
      <div>R<sub>corot</sub>: <span id="r-rcor">---</span> kpc</div>
      <div>Arms: <span id="r-arms">2</span> &nbsp; Pitch: <span id="r-pitch">15</span>&deg;</div>
      <div>v(8): <span id="r-v8">---</span> km/s</div>
    </div>
    <p class="hint">Drag to orbit &middot; Scroll to zoom &middot; Space: play/pause</p>
  </div>

  <div id="panels">
    <div class="panel-box">
      <h3>Angular Velocities</h3>
      <canvas id="omega-canvas" width="380" height="220"></canvas>
    </div>
  </div>

  <div id="controls">
    <button id="btn-play" class="active">&#9646;&#9646; Pause</button>
    <div class="sep"></div>
    <label>Speed
      <select id="speed-sel">
        <option value="0.01">0.01x</option>
        <option value="0.05" selected>0.05x</option>
        <option value="0.1">0.1x</option>
        <option value="0.2">0.2x</option>
        <option value="0.5">0.5x</option>
        <option value="1">1.0x</option>
      </select>
    </label>
    <div class="sep"></div>
    <label>&Omega;<sub>p</sub> <input type="range" id="omegap-slider" min="10" max="50" value="25" step="1">
      <span class="val" id="omegap-val">25</span></label>
    <label>Arms
      <select id="arms-sel">
        <option value="1">1</option>
        <option value="2" selected>2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>
    </label>
    <label>Pitch <input type="range" id="pitch-slider" min="5" max="35" value="15" step="1">
      <span class="val" id="pitch-val">15&deg;</span></label>
    <div class="sep"></div>
    <label>DM <input type="range" id="dm-slider" min="0" max="100" value="100" step="1">
      <span class="val" id="dm-val">100%</span></label>
    <div class="sep"></div>
    <button id="btn-traffic">Traffic Jam</button>
    <label><input type="checkbox" id="cb-zones"> Zones</label>
  </div>

  <div id="credit">COSMOS &middot; Swinburne Astronomy Online</div>

  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }}
  </script>
  <script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
  import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

  // ===================================================================
  //  Embedded mode
  // ===================================================================
  const isEmbedded = window.self !== window.top || new URLSearchParams(location.search).has('embed');
  if (isEmbedded) document.body.classList.add('embedded');

  // ===================================================================
  //  Constants
  // ===================================================================
  const PI = Math.PI, TWO_PI = 2 * PI;

  // G in convenient units: M in 10^10 Msun, R in kpc, v in km/s
  const G_ = 4.302e4;

  // Default mass model parameters (from rotation-curve-interactive.html)
  const DEF = {
    Mb: 1.5,    // bulge mass in 10^10 Msun
    ab: 0.5,    // bulge scale radius in kpc
    Md: 5.0,    // disk mass in 10^10 Msun
    Rd: 2.6,    // disk scale length in kpc
    rho0: 3.5e-3, // halo central density in 10^10 Msun/kpc^3
    Rc: 5.0,    // halo core radius in kpc
  };

  // Visual scale: 1 kpc = 0.5 scene units
  const KPC_TO_VIS = 0.5;
  const R_INNER = 0.3;
  const R_OUTER = 22;
  const N_PARTICLES = 10000;

  // ===================================================================
  //  Modified Bessel functions (Abramowitz & Stegun)
  // ===================================================================
  function besselI0(x) {
    if (x < 0) x = -x;
    if (x < 3.75) {
      const t = (x / 3.75) ** 2;
      return 1 + 3.5156229*t + 3.0899424*t**2 + 1.2067492*t**3
               + 0.2659732*t**4 + 0.0360768*t**5 + 0.0045813*t**6;
    }
    const t = 3.75 / x;
    return (Math.exp(x) / Math.sqrt(x)) * (0.39894228 + 0.01328592*t
      + 0.00225319*t**2 - 0.00157565*t**3 + 0.00916281*t**4
      - 0.02057706*t**5 + 0.02635537*t**6 - 0.01647633*t**7 + 0.00392377*t**8);
  }

  function besselI1(x) {
    if (x < 0) return -besselI1(-x);
    if (x < 3.75) {
      const t = (x / 3.75) ** 2;
      return x * (0.5 + 0.87890594*t + 0.51498869*t**2 + 0.15084934*t**3
                     + 0.02658733*t**4 + 0.00301532*t**5 + 0.00032411*t**6);
    }
    const t = 3.75 / x;
    return (Math.exp(x) / Math.sqrt(x)) * (0.39894228 - 0.03988024*t
      - 0.00362018*t**2 + 0.00163801*t**3 - 0.01031555*t**4
      + 0.02282967*t**5 - 0.02895312*t**6 + 0.01787654*t**7 - 0.00420059*t**8);
  }

  function besselK0(x) {
    if (x <= 2) {
      const t = (x / 2) ** 2;
      return -Math.log(x / 2) * besselI0(x) + (-0.57721566 + 0.42278420*t
        + 0.23069756*t**2 + 0.03488590*t**3 + 0.00262698*t**4
        + 0.00010750*t**5 + 0.00000740*t**6);
    }
    const t = 2 / x;
    return (Math.exp(-x) / Math.sqrt(x)) * (1.25331414 - 0.07832358*t
      + 0.02189568*t**2 - 0.01062446*t**3 + 0.00587872*t**4
      - 0.00251540*t**5 + 0.00053208*t**6);
  }

  function besselK1(x) {
    if (x <= 2) {
      const t = (x / 2) ** 2;
      return Math.log(x / 2) * besselI1(x) + (1 / x) * (1 + 0.15443144*t
        - 0.67278579*t**2 - 0.18156897*t**3 - 0.01919402*t**4
        - 0.00110404*t**5 - 0.00004686*t**6);
    }
    const t = 2 / x;
    return (Math.exp(-x) / Math.sqrt(x)) * (1.25331414 + 0.23498619*t
      - 0.03655620*t**2 + 0.01504268*t**3 - 0.00780353*t**4
      + 0.00325614*t**5 - 0.00068245*t**6);
  }

  // ===================================================================
  //  Rotation curve physics (three-component mass model)
  // ===================================================================
  function vBulge(R, Mb, ab) {
    if (R < 1e-6) return 0;
    return Math.sqrt(G_ * Mb * R / (R + ab) ** 2);
  }

  function vDisk(R, Md, Rd) {
    const y = R / (2 * Rd);
    if (y < 1e-8) return 0;
    const bess = besselI0(y) * besselK0(y) - besselI1(y) * besselK1(y);
    const v2 = 0.5 * G_ * Md / Rd * (2 * y * y) * bess;
    return Math.sqrt(Math.max(v2, 0));
  }

  function vHalo(R, rho0, Rc) {
    if (R < 1e-6) return 0;
    const v2 = 4 * PI * G_ * rho0 * Rc * Rc * (1 - (Rc / R) * Math.atan(R / Rc));
    return Math.sqrt(Math.max(v2, 0));
  }

  function vTotal(R, fDM) {
    const vb = vBulge(R, DEF.Mb, DEF.ab);
    const vd = vDisk(R, DEF.Md, DEF.Rd);
    const vh = vHalo(R, DEF.rho0, DEF.Rc);
    return Math.sqrt(vb * vb + vd * vd + fDM * vh * vh);
  }

  // Tune rho0 so v(8.2 kpc) ~ 220 km/s
  {
    const targetV = 220;
    const vb = vBulge(8.2, DEF.Mb, DEF.ab);
    const vd = vDisk(8.2, DEF.Md, DEF.Rd);
    const vhTarget = Math.sqrt(Math.max(targetV * targetV - vb * vb - vd * vd, 0));
    const factor = 1 - (DEF.Rc / 8.2) * Math.atan(8.2 / DEF.Rc);
    DEF.rho0 = (vhTarget * vhTarget) / (4 * PI * G_ * DEF.Rc * DEF.Rc * factor);
    console.log('Tuned rho0 =', DEF.rho0.toExponential(4));
    console.log('v(8.2 kpc) =', vTotal(8.2, 1.0).toFixed(1), 'km/s');
  }

  // Angular velocity in km/s/kpc
  function omegaKmKpc(R, fDM) {
    if (R < 0.1) return vTotal(0.1, fDM) / 0.1;
    return vTotal(R, fDM) / R;
  }

  // Epicyclic frequency kappa(R) in km/s/kpc
  // kappa^2 = (2*Omega/R) * d(R^2*Omega)/dR — numerical differentiation
  function kappaKmKpc(R, fDM) {
    const dR = 0.05;
    const R1 = Math.max(R - dR, 0.1);
    const R2 = R + dR;
    const Om1 = omegaKmKpc(R1, fDM);
    const Om2 = omegaKmKpc(R2, fDM);
    const Om = omegaKmKpc(R, fDM);
    const dR2Om_dR = (R2 * R2 * Om2 - R1 * R1 * Om1) / (R2 - R1);
    const kappa2 = (2 * Om / R) * dR2Om_dR;
    return Math.sqrt(Math.max(kappa2, 0));
  }

  // Find corotation radius: Omega(R) = Omega_p
  function findCorotation(omegaP, fDM) {
    for (let R = 0.5; R < 30; R += 0.1) {
      if (omegaKmKpc(R, fDM) < omegaP) return R;
    }
    return 30;
  }

  // Find ILR: Omega(R) - kappa(R)/m = Omega_p  =>  Omega(R) = Omega_p + kappa(R)/m
  // Scan inward from corotation
  function findILR(omegaP, m, fDM) {
    for (let R = 0.5; R < 30; R += 0.1) {
      const omPlus = omegaKmKpc(R, fDM) - kappaKmKpc(R, fDM) / m;
      if (omPlus < omegaP) return R;
    }
    return 0.5;
  }

  // Find OLR: Omega(R) + kappa(R)/m = Omega_p  =>  Omega(R) = Omega_p - kappa(R)/m
  // Scan outward from corotation
  function findOLR(omegaP, m, fDM) {
    for (let R = 30; R > 0.5; R -= 0.1) {
      const omMinus = omegaKmKpc(R, fDM) + kappaKmKpc(R, fDM) / m;
      if (omMinus > omegaP) return R;
    }
    return 30;
  }

  // ===================================================================
  //  State
  // ===================================================================
  let fDM = 1.0;
  let omegaP_kms_kpc = 25; // pattern speed in km/s/kpc
  let nArms = 2;
  let pitchDeg = 15;
  let playing = true, speedMul = 0.05;
  let simTime = 0; // in Myr
  let showTraffic = false;
  let showZones = false;

  // Conversion: Omega_p in km/s/kpc to rad/Myr
  // 1 km/s/kpc = 1.0227e-3 rad/Myr
  const OMEGA_CONV = 1.0227e-3;

  // Gaussian random (Box-Muller)
  function gaussRand() {
    let u, v;
    do { u = Math.random(); } while (u < 1e-10);
    v = Math.random();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(TWO_PI * v);
  }

  // ===================================================================
  //  Three.js setup
  // ===================================================================
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 500);
  camera.position.set(0, 13, 0.01);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 4;
  controls.maxDistance = 40;

  // Bloom: galaxy preset (strength 0.5, radius 0.7, threshold 0.3)
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloom = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight), 0.5, 0.7, 0.3
  );
  composer.addPass(bloom);
  composer.addPass(new OutputPass());

  // ===================================================================
  //  Galaxy particle system
  // ===================================================================
  const BT = DEF.Mb / (DEF.Mb + DEF.Md); // ~0.23

  // Density wave parameters
  const SIGMA_ARM = 0.25; // Gaussian width of arm in radians
  const R_REF = 1.0; // reference radius for logarithmic spiral

  // Colour palette
  const colBulge = new THREE.Color(0xffcc66);
  const colInterArm = new THREE.Color(0xffcc88); // warm yellow-orange for old disk stars
  const colOB = new THREE.Color(0x88ccff);        // blue-white for star-forming regions

  // Generate particles
  let particles = [];
  let galaxyGeo, galaxyMat, galaxyPoints;

  function generateParticles() {
    const nBulge = Math.round(BT * N_PARTICLES);
    particles = [];

    for (let i = 0; i < N_PARTICLES; i++) {
      if (i < nBulge) {
        // Bulge particles: concentrated at centre, isotropic
        const u = Math.random();
        let R = -DEF.ab * Math.log(1 - u * 0.95);
        R = Math.min(R, DEF.ab * 3);
        R = Math.max(R, 0.05);
        const theta = Math.random() * TWO_PI;

        // Pressure-supported: random inclination and eccentricity
        const inclination = Math.acos(2 * Math.random() - 1);
        const eccentricity = 0.3 + Math.random() * 0.6;
        const vCirc = vTotal(R, fDM);
        const vDisp = vCirc * (0.4 + Math.random() * 0.3);
        const omega_myr = (vDisp / R) * OMEGA_CONV;
        const ascNode = Math.random() * TWO_PI;

        particles.push({
          R, theta, omega_myr,
          isBulge: true,
          inclination, ascNode,
          orbPhase: Math.random() * TWO_PI,
          eccentricity,
        });
      } else {
        // Disk particles: exponential radial profile, uniform theta
        const u = Math.random();
        let R = -DEF.Rd * Math.log(1 - u * 0.9999);
        R = Math.max(R, R_INNER);
        R = Math.min(R, R_OUTER);

        // Uniform initial theta -- no arm pre-assignment
        const theta = Math.random() * TWO_PI;

        // Keplerian angular velocity
        const omega_myr = (vTotal(R, fDM) / R) * OMEGA_CONV;

        particles.push({
          R, theta, omega_myr,
          isBulge: false,
          inclination: 0,
          orbPhase: 0,
          eccentricity: 0,
        });
      }
    }
  }

  function buildGalaxyGeometry() {
    const posArr = new Float32Array(N_PARTICLES * 3);
    const colArr = new Float32Array(N_PARTICLES * 3);
    const sizeArr = new Float32Array(N_PARTICLES);

    for (let i = 0; i < N_PARTICLES; i++) {
      const p = particles[i];
      const t = Math.min(p.R / R_OUTER, 1);

      if (p.isBulge) {
        const bf = Math.min(p.R / 2.0, 1);
        const c = colBulge.clone();
        c.lerp(new THREE.Color(0xffaa44), bf);
        colArr[i * 3] = c.r;
        colArr[i * 3 + 1] = c.g;
        colArr[i * 3 + 2] = c.b;
        sizeArr[i] = 0.09;
      } else {
        // Start with warm inter-arm colour; will be updated per-frame
        colArr[i * 3] = colInterArm.r;
        colArr[i * 3 + 1] = colInterArm.g;
        colArr[i * 3 + 2] = colInterArm.b;
        sizeArr[i] = Math.max(0.06, 0.14 - t * 0.06);
      }
    }

    if (galaxyGeo) galaxyGeo.dispose();
    galaxyGeo = new THREE.BufferGeometry();
    galaxyGeo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
    galaxyGeo.setAttribute('color', new THREE.BufferAttribute(colArr, 3));
    galaxyGeo.setAttribute('size', new THREE.BufferAttribute(sizeArr, 1));

    return galaxyGeo;
  }

  // Custom shader: per-vertex colour + size, circular particles
  galaxyMat = new THREE.ShaderMaterial({
    uniforms: {
      uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) },
    },
    vertexShader: `
      attribute float size;
      varying vec3 vColor;
      uniform float uPixelRatio;
      void main() {
        vColor = color;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * uPixelRatio * (200.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        if (d > 1.0) discard;
        float alpha = exp(-d * d * 2.0);
        gl_FragColor = vec4(vColor, alpha);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    vertexColors: true,
  });

  // Build and add
  generateParticles();
  buildGalaxyGeometry();
  galaxyPoints = new THREE.Points(galaxyGeo, galaxyMat);
  scene.add(galaxyPoints);

  // Central bulge glow
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(0.6, 32, 32),
    new THREE.MeshBasicMaterial({
      color: 0xffddaa, transparent: true, opacity: 0.04,
      blending: THREE.AdditiveBlending, depthWrite: false,
    })
  ));

  // ===================================================================
  //  Traffic jam overlay — translucent spiral ribbons
  // ===================================================================
  const trafficGroup = new THREE.Group();
  trafficGroup.visible = false;
  scene.add(trafficGroup);

  // Build ribbon geometry at t=0 (time-independent shape).
  // The group is then rotated by Omega_p * simTime each frame.
  let trafficDirty = true; // rebuild when controls change

  function buildTrafficRibbons() {
    // Remove old
    while (trafficGroup.children.length > 0) {
      const c = trafficGroup.children[0];
      c.geometry.dispose();
      c.material.dispose();
      trafficGroup.remove(c);
    }

    const tanPitch = Math.tan(pitchDeg * PI / 180);
    const invTanPitch = 1.0 / tanPitch;

    // Determine ILR and OLR to bound the ribbon
    const rILR = findILR(omegaP_kms_kpc, nArms, fDM);
    const rOLR = findOLR(omegaP_kms_kpc, nArms, fDM);
    const rStart = Math.max(rILR - 1, 0.5);
    const rEnd = Math.min(rOLR + 1, R_OUTER);

    for (let j = 0; j < nArms; j++) {
      const armOffset = (TWO_PI * j) / nArms;

      // Build ribbon as a series of quads (at t=0, no time term)
      const positions = [];
      const step = 0.2;

      for (let R = rStart; R <= rEnd; R += step) {
        const phi = armOffset - invTanPitch * Math.log(R / R_REF);

        // Offset by angular half-width (~0.7 * SIGMA_ARM for a tighter lane)
        const halfW = SIGMA_ARM * 0.7;
        const phiMinus = phi - halfW;
        const phiPlus = phi + halfW;

        positions.push(
          R * Math.cos(phiMinus) * KPC_TO_VIS, 0.005, R * Math.sin(phiMinus) * KPC_TO_VIS,
          R * Math.cos(phiPlus)  * KPC_TO_VIS, 0.005, R * Math.sin(phiPlus)  * KPC_TO_VIS,
        );
      }

      // Build indexed geometry from the strip
      const nSegments = Math.floor((positions.length / 6)) - 1;
      if (nSegments < 1) continue;

      const vertices = new Float32Array(positions);
      const indices = [];
      for (let s = 0; s < nSegments; s++) {
        const i = s * 2;
        indices.push(i, i + 1, i + 2);
        indices.push(i + 1, i + 3, i + 2);
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
      geo.setIndex(indices);

      const mat = new THREE.MeshBasicMaterial({
        color: 0x44bbdd, transparent: true, opacity: 0.08,
        blending: THREE.AdditiveBlending, depthWrite: false,
        side: THREE.DoubleSide,
      });

      trafficGroup.add(new THREE.Mesh(geo, mat));
    }
    trafficDirty = false;
  }

  // ===================================================================
  //  Zone rings (corotation, ILR, OLR)
  // ===================================================================
  const zoneGroup = new THREE.Group();
  zoneGroup.visible = false;
  scene.add(zoneGroup);

  function buildZoneRings() {
    while (zoneGroup.children.length > 0) {
      const c = zoneGroup.children[0];
      c.geometry.dispose();
      c.material.dispose();
      zoneGroup.remove(c);
    }

    const rCor = findCorotation(omegaP_kms_kpc, fDM);
    const rILR = findILR(omegaP_kms_kpc, nArms, fDM);
    const rOLR = findOLR(omegaP_kms_kpc, nArms, fDM);

    function addRing(R, color, label) {
      if (R < 0.5 || R > 28) return;
      const geo = new THREE.RingGeometry(R * KPC_TO_VIS - 0.02, R * KPC_TO_VIS + 0.02, 128);
      geo.rotateX(-PI / 2);
      const mat = new THREE.MeshBasicMaterial({
        color, transparent: true, opacity: 0.35,
        blending: THREE.AdditiveBlending, depthWrite: false,
        side: THREE.DoubleSide,
      });
      zoneGroup.add(new THREE.Mesh(geo, mat));

      // Label sprite
      const canvas = document.createElement('canvas');
      canvas.width = 256; canvas.height = 48;
      const ctx = canvas.getContext('2d');
      ctx.font = '600 22px "Open Sans", sans-serif';
      ctx.fillStyle = '#' + new THREE.Color(color).getHexString();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = '#000';
      ctx.shadowBlur = 6;
      ctx.fillText(label, 128, 24);
      const tex = new THREE.CanvasTexture(canvas);
      const sMat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.7, depthWrite: false });
      const sprite = new THREE.Sprite(sMat);
      sprite.position.set(0, 0.05, -(R * KPC_TO_VIS + 0.3));
      sprite.scale.set(2.5, 0.5, 1);
      zoneGroup.add(sprite);
    }

    addRing(rCor, 0x44ff88, 'COROTATION');
    addRing(rILR, 0xff8844, 'ILR');
    addRing(rOLR, 0xdd66dd, 'OLR');
  }

  // ===================================================================
  //  Background stars (two-layer)
  // ===================================================================
  function makeCircleMat(color, size, opacity) {
    return new THREE.ShaderMaterial({
      uniforms: {
        uColor: { value: new THREE.Color(color) },
        uSize: { value: size },
        uOpacity: { value: opacity },
        uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) },
      },
      vertexShader: `
        uniform float uSize;
        uniform float uPixelRatio;
        void main() {
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = max(uSize * uPixelRatio * (200.0 / -mv.z), 1.2);
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        uniform vec3 uColor;
        uniform float uOpacity;
        void main() {
          float d = length(gl_PointCoord - 0.5) * 2.0;
          if (d > 1.0) discard;
          float alpha = exp(-d * d * 3.0) * uOpacity;
          gl_FragColor = vec4(uColor, alpha);
        }
      `,
      transparent: true,
      depthWrite: false,
    });
  }

  {
    const N = 800, pos = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      const th = Math.random() * TWO_PI;
      const ph = Math.acos(2 * Math.random() - 1);
      const r = 50 + Math.random() * 70;
      pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
      pos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
      pos[i*3+2] = r * Math.cos(ph);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    scene.add(new THREE.Points(geo, makeCircleMat(0xffffff, 0.25, 0.3)));

    const NB = 80, bpos = new Float32Array(NB * 3);
    for (let i = 0; i < NB; i++) {
      const th = Math.random() * TWO_PI;
      const ph = Math.acos(2 * Math.random() - 1);
      const r = 40 + Math.random() * 60;
      bpos[i*3]   = r * Math.sin(ph) * Math.cos(th);
      bpos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
      bpos[i*3+2] = r * Math.cos(ph);
    }
    const bgeo = new THREE.BufferGeometry();
    bgeo.setAttribute('position', new THREE.BufferAttribute(bpos, 3));
    scene.add(new THREE.Points(bgeo, makeCircleMat(0xffffff, 0.5, 0.9)));
  }

  // ===================================================================
  //  Update particles (positions + density wave colouring)
  // ===================================================================
  const tmpCol = new THREE.Color();
  const tmpInterp = new THREE.Color();

  function updateParticles(dt) {
    const pos = galaxyGeo.attributes.position.array;
    const col = galaxyGeo.attributes.color.array;
    const sizes = galaxyGeo.attributes.size.array;

    const omP_rad_myr = omegaP_kms_kpc * OMEGA_CONV; // pattern speed in rad/Myr
    const tanPitch = Math.tan(pitchDeg * PI / 180);
    const invTanPitch = 1.0 / tanPitch;
    const armPeriod = TWO_PI / nArms; // angular spacing between arms

    // Resonance radii for fade-out
    const rILR = findILR(omegaP_kms_kpc, nArms, fDM);
    const rOLR = findOLR(omegaP_kms_kpc, nArms, fDM);

    for (let i = 0; i < N_PARTICLES; i++) {
      const p = particles[i];

      if (p.isBulge) {
        // Pressure-supported orbits
        p.orbPhase += p.omega_myr * dt;
        const ecc = p.eccentricity;
        const rMod = p.R * (1 - ecc * ecc) / (1 + ecc * Math.cos(p.orbPhase));
        const vis = rMod * KPC_TO_VIS;
        const xP = vis * Math.cos(p.orbPhase);
        const yP = vis * Math.sin(p.orbPhase);
        const cosO = Math.cos(p.ascNode), sinO = Math.sin(p.ascNode);
        const cosI = Math.cos(p.inclination), sinI = Math.sin(p.inclination);
        pos[i * 3]     = cosO * xP - sinO * cosI * yP;
        pos[i * 3 + 1] = sinI * yP;
        pos[i * 3 + 2] = sinO * xP + cosO * cosI * yP;
        // Bulge colour stays warm yellow (no density wave effect)
        continue;
      }

      // Disk: advance theta (counter-clockwise = prograde)
      p.theta += p.omega_myr * dt;
      const vis = p.R * KPC_TO_VIS;
      pos[i * 3]     = vis * Math.cos(p.theta);
      pos[i * 3 + 1] = (Math.random() - 0.5) * 0.02;
      pos[i * 3 + 2] = vis * Math.sin(p.theta);

      // --- Density wave colouring ---
      // Spiral arm ridge angle at this radius and time
      const phi_arm = omP_rad_myr * simTime - invTanPitch * Math.log(p.R / R_REF);

      // Angular distance to nearest arm ridge
      let delta = ((p.theta - phi_arm) % armPeriod + armPeriod) % armPeriod;
      if (delta > armPeriod / 2) delta -= armPeriod;

      // Gaussian arm proximity
      let armProx = Math.exp(-(delta * delta) / (2 * SIGMA_ARM * SIGMA_ARM));

      // Fade out arm effect outside ILR-OLR range
      if (p.R < rILR) {
        const fade = Math.max(0, 1 - (rILR - p.R) / 2.0);
        armProx *= fade;
      }
      if (p.R > rOLR) {
        const fade = Math.max(0, 1 - (p.R - rOLR) / 2.0);
        armProx *= fade;
      }

      // Colour: lerp from warm inter-arm to blue-white OB based on arm proximity
      const threshold = 0.3;
      let sfStrength = 0;
      if (armProx > threshold) {
        sfStrength = (armProx - threshold) / (1 - threshold);
      }

      // Radial brightness falloff for inter-arm population
      const rFrac = Math.min(p.R / R_OUTER, 1);
      const dimFactor = 1.0 - rFrac * 0.5;

      // Inter-arm base: warm colour, dimmer at large R
      tmpCol.setRGB(
        colInterArm.r * dimFactor,
        colInterArm.g * dimFactor,
        colInterArm.b * dimFactor
      );

      // Star-forming blue-white — brighter to trigger bloom
      tmpInterp.setRGB(
        colOB.r * (1.0 + sfStrength * 0.6),
        colOB.g * (1.0 + sfStrength * 0.6),
        colOB.b * (1.0 + sfStrength * 0.3)
      );

      // Lerp
      tmpCol.lerp(tmpInterp, sfStrength);

      col[i * 3]     = tmpCol.r;
      col[i * 3 + 1] = tmpCol.g;
      col[i * 3 + 2] = tmpCol.b;

      // Increase size in arms for enhanced density + glow
      const baseSize = Math.max(0.06, 0.14 - rFrac * 0.06);
      sizes[i] = baseSize * (1 + sfStrength * 0.6);
    }

    galaxyGeo.attributes.position.needsUpdate = true;
    galaxyGeo.attributes.color.needsUpdate = true;
    galaxyGeo.attributes.size.needsUpdate = true;
  }

  // Recompute angular velocities when DM changes
  function recomputeOmegas() {
    for (let i = 0; i < N_PARTICLES; i++) {
      const p = particles[i];
      const v = vTotal(p.R, fDM);
      if (p.isBulge) {
        const vDisp = v * (0.4 + 0.3 * (p.eccentricity - 0.3) / 0.6);
        p.omega_myr = (vDisp / p.R) * OMEGA_CONV;
      } else {
        p.omega_myr = (v / p.R) * OMEGA_CONV;
      }
    }
  }

  // Initial position + colour update
  updateParticles(0);

  // ===================================================================
  //  2D Omega(r) panel
  // ===================================================================
  const omCanvas = document.getElementById('omega-canvas');
  const omCtx = omCanvas.getContext('2d');
  const omW = omCanvas.width, omH = omCanvas.height;
  const omPad = { left: 42, right: 12, top: 16, bottom: 28 };
  const omPlotW = omW - omPad.left - omPad.right;
  const omPlotH = omH - omPad.top - omPad.bottom;
  const R_MAX_PLOT = 25;
  const OM_MAX_PLOT = 150; // km/s/kpc

  function rToX(R) { return omPad.left + (R / R_MAX_PLOT) * omPlotW; }
  function omToY(om) { return omPad.top + omPlotH - (om / OM_MAX_PLOT) * omPlotH; }

  function drawOmegaPanel() {
    omCtx.clearRect(0, 0, omW, omH);

    // Background
    omCtx.fillStyle = 'rgba(5, 5, 20, 0.95)';
    omCtx.fillRect(0, 0, omW, omH);

    // Grid
    omCtx.strokeStyle = 'rgba(255,255,255,0.06)';
    omCtx.lineWidth = 0.5;
    for (let om = 25; om <= 125; om += 25) {
      omCtx.beginPath();
      omCtx.moveTo(omPad.left, omToY(om));
      omCtx.lineTo(omPad.left + omPlotW, omToY(om));
      omCtx.stroke();
    }
    for (let R = 5; R <= 20; R += 5) {
      omCtx.beginPath();
      omCtx.moveTo(rToX(R), omPad.top);
      omCtx.lineTo(rToX(R), omPad.top + omPlotH);
      omCtx.stroke();
    }

    // Axes
    omCtx.strokeStyle = 'rgba(255,255,255,0.3)';
    omCtx.lineWidth = 1;
    omCtx.beginPath();
    omCtx.moveTo(omPad.left, omPad.top);
    omCtx.lineTo(omPad.left, omPad.top + omPlotH);
    omCtx.lineTo(omPad.left + omPlotW, omPad.top + omPlotH);
    omCtx.stroke();

    // Axis labels
    omCtx.fillStyle = 'rgba(255,255,255,0.6)';
    omCtx.font = '11px "Open Sans", sans-serif';
    omCtx.textAlign = 'center';
    for (let R = 0; R <= 25; R += 5) {
      omCtx.fillText(R, rToX(R), omPad.top + omPlotH + 14);
    }
    omCtx.fillText('R (kpc)', omPad.left + omPlotW / 2, omPad.top + omPlotH + 25);

    omCtx.textAlign = 'right';
    for (let om = 0; om <= 150; om += 50) {
      omCtx.fillText(om, omPad.left - 4, omToY(om) + 3);
    }
    omCtx.save();
    omCtx.translate(10, omPad.top + omPlotH / 2);
    omCtx.rotate(-PI / 2);
    omCtx.textAlign = 'center';
    omCtx.fillStyle = 'rgba(255,255,255,0.6)';
    omCtx.font = '10px "Open Sans", sans-serif';
    omCtx.fillText('\u03A9 (km/s/kpc)', 0, 0);
    omCtx.restore();

    // Helper: draw curve
    function drawCurve(fn, color, lineWidth, dashed) {
      omCtx.strokeStyle = color;
      omCtx.lineWidth = lineWidth;
      if (dashed) omCtx.setLineDash(dashed);
      else omCtx.setLineDash([]);
      omCtx.beginPath();
      let started = false;
      for (let px = 0; px <= omPlotW; px += 1) {
        const R = (px / omPlotW) * R_MAX_PLOT;
        if (R < 0.3) continue;
        const v = fn(R);
        if (!isFinite(v) || v < 0) continue;
        const x = omPad.left + px;
        const y = omToY(v);
        if (!started) { omCtx.moveTo(x, y); started = true; }
        else omCtx.lineTo(x, y);
      }
      omCtx.stroke();
      omCtx.setLineDash([]);
    }

    // Omega(R) — material angular velocity (white solid)
    drawCurve(R => omegaKmKpc(R, fDM), '#ffffff', 2.5, null);

    // Omega_p — horizontal line (cyan dashed)
    const yOmP = omToY(omegaP_kms_kpc);
    omCtx.strokeStyle = '#44ddff';
    omCtx.lineWidth = 2;
    omCtx.setLineDash([6, 3]);
    omCtx.beginPath();
    omCtx.moveTo(omPad.left, yOmP);
    omCtx.lineTo(omPad.left + omPlotW, yOmP);
    omCtx.stroke();
    omCtx.setLineDash([]);

    // Omega - kappa/m (for OLR, magenta dashed)
    drawCurve(R => {
      const om = omegaKmKpc(R, fDM);
      const kap = kappaKmKpc(R, fDM);
      return om - kap / nArms;
    }, 'rgba(220,100,220,0.7)', 1.5, [4, 3]);

    // Omega + kappa/m (for ILR, orange dashed)
    drawCurve(R => {
      const om = omegaKmKpc(R, fDM);
      const kap = kappaKmKpc(R, fDM);
      return om + kap / nArms;
    }, 'rgba(255,136,68,0.7)', 1.5, [4, 3]);

    // Mark resonances with vertical lines
    const rCor = findCorotation(omegaP_kms_kpc, fDM);
    const rILR = findILR(omegaP_kms_kpc, nArms, fDM);
    const rOLR = findOLR(omegaP_kms_kpc, nArms, fDM);

    function drawVertical(R, color, label) {
      if (R < 0.5 || R > R_MAX_PLOT) return;
      const x = rToX(R);
      omCtx.strokeStyle = color;
      omCtx.lineWidth = 1;
      omCtx.setLineDash([3, 3]);
      omCtx.beginPath();
      omCtx.moveTo(x, omPad.top);
      omCtx.lineTo(x, omPad.top + omPlotH);
      omCtx.stroke();
      omCtx.setLineDash([]);
      omCtx.fillStyle = color;
      omCtx.font = '10px "Open Sans", sans-serif';
      omCtx.textAlign = 'center';
      omCtx.fillText(label, x, omPad.top - 3);
    }

    drawVertical(rCor, '#44ff88', 'CR');
    drawVertical(rILR, '#ff8844', 'ILR');
    drawVertical(rOLR, '#dd66dd', 'OLR');

    // Legend
    const legX = omPad.left + omPlotW - 80, legY = omPad.top + 6;
    omCtx.font = '10px "Open Sans", sans-serif';
    const legends = [
      { color: '#ffffff', label: '\u03A9(R)', dash: false },
      { color: '#44ddff', label: '\u03A9\u209A', dash: true },
      { color: 'rgba(255,136,68,0.9)', label: '\u03A9+\u03BA/m', dash: true },
      { color: 'rgba(220,100,220,0.9)', label: '\u03A9\u2212\u03BA/m', dash: true },
    ];
    legends.forEach((l, i) => {
      const y = legY + i * 14;
      omCtx.strokeStyle = l.color;
      omCtx.lineWidth = l.dash ? 1.5 : 2;
      omCtx.setLineDash(l.dash ? [3, 2] : []);
      omCtx.beginPath();
      omCtx.moveTo(legX, y + 4);
      omCtx.lineTo(legX + 14, y + 4);
      omCtx.stroke();
      omCtx.setLineDash([]);
      omCtx.fillStyle = l.color;
      omCtx.textAlign = 'left';
      omCtx.fillText(l.label, legX + 17, y + 7);
    });
  }

  // ===================================================================
  //  Readouts
  // ===================================================================
  function updateReadouts() {
    document.getElementById('r-omegap').textContent = omegaP_kms_kpc;
    document.getElementById('r-v8').textContent = vTotal(8, fDM).toFixed(0);
    document.getElementById('r-arms').textContent = nArms;
    document.getElementById('r-pitch').textContent = pitchDeg;

    const rCor = findCorotation(omegaP_kms_kpc, fDM);
    document.getElementById('r-rcor').textContent = rCor < 28 ? rCor.toFixed(1) : '>25';
  }

  // ===================================================================
  //  Controls wiring
  // ===================================================================
  const btnPlay = document.getElementById('btn-play');
  btnPlay.addEventListener('click', () => {
    playing = !playing;
    btnPlay.innerHTML = playing ? '&#9646;&#9646; Pause' : '&#9654; Play';
    btnPlay.classList.toggle('active', playing);
  });

  document.addEventListener('keydown', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      btnPlay.click();
    }
  });

  document.getElementById('speed-sel').addEventListener('change', e => {
    speedMul = parseFloat(e.target.value);
  });

  // Pattern speed slider
  const omegapSlider = document.getElementById('omegap-slider');
  const omegapVal = document.getElementById('omegap-val');
  omegapSlider.addEventListener('input', () => {
    omegaP_kms_kpc = parseInt(omegapSlider.value);
    omegapVal.textContent = omegaP_kms_kpc;
    trafficDirty = true;
    if (showZones) buildZoneRings();
    drawOmegaPanel();
    updateReadouts();
  });

  // Arms selector
  document.getElementById('arms-sel').addEventListener('change', e => {
    nArms = parseInt(e.target.value);
    trafficDirty = true;
    if (showZones) buildZoneRings();
    drawOmegaPanel();
    updateReadouts();
  });

  // Pitch slider
  const pitchSlider = document.getElementById('pitch-slider');
  const pitchVal = document.getElementById('pitch-val');
  pitchSlider.addEventListener('input', () => {
    pitchDeg = parseInt(pitchSlider.value);
    pitchVal.innerHTML = pitchDeg + '&deg;';
    trafficDirty = true;
    updateReadouts();
  });

  // DM slider
  const dmSlider = document.getElementById('dm-slider');
  const dmVal = document.getElementById('dm-val');
  dmSlider.addEventListener('input', () => {
    fDM = parseInt(dmSlider.value) / 100;
    dmVal.textContent = dmSlider.value + '%';
    recomputeOmegas();
    trafficDirty = true;
    if (showZones) buildZoneRings();
    drawOmegaPanel();
    updateReadouts();
  });

  // Traffic Jam toggle
  const btnTraffic = document.getElementById('btn-traffic');
  btnTraffic.addEventListener('click', () => {
    showTraffic = !showTraffic;
    btnTraffic.classList.toggle('active', showTraffic);
    trafficGroup.visible = showTraffic;
    if (showTraffic) {
      trafficDirty = true; // will build on next frame
    }
  });

  // Zone rings toggle
  document.getElementById('cb-zones').addEventListener('change', e => {
    showZones = e.target.checked;
    zoneGroup.visible = showZones;
    if (showZones) buildZoneRings();
  });

  // ===================================================================
  //  Animation loop
  // ===================================================================
  let lastTime = 0;
  const BASE_DT = 3.0; // Myr per frame at 1x speed at 60fps

  function animate(now) {
    requestAnimationFrame(animate);

    const elapsed = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    if (playing) {
      const dt = BASE_DT * speedMul * elapsed * 60;
      simTime += dt;
      updateParticles(dt);
    }

    // Rotate traffic group rigidly at pattern speed
    if (showTraffic) {
      if (trafficDirty) buildTrafficRibbons();
      trafficGroup.rotation.y = omegaP_kms_kpc * OMEGA_CONV * simTime;
    }

    controls.update();
    composer.render();
  }

  // Initial draws
  drawOmegaPanel();
  updateReadouts();
  updateParticles(0);

  requestAnimationFrame(animate);

  // ===================================================================
  //  Resize handler
  // ===================================================================
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
    bloom.resolution.set(window.innerWidth, window.innerHeight);
    galaxyMat.uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio, 2);
  });

  // Pause when tab hidden
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      playing = false;
      btnPlay.innerHTML = '&#9654; Play';
      btnPlay.classList.remove('active');
    }
  });

  </script>
